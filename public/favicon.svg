<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#f0f9ff" stroke="#34d399" stroke-width="1.5"/>

  <!-- Mosque dome -->
  <ellipse cx="50" cy="40" rx="28" ry="22" fill="#34d399"/>

  <!-- Dome highlight -->
  <ellipse cx="50" cy="35" rx="24" ry="8" fill="#52e0aa" opacity="0.6"/>

  <!-- Crescent and star on top of dome -->
  <g transform="translate(50, 18)">
    <!-- Crescent moon -->
    <path d="M -8 0 A 8 8 0 1 1 8 0 A 6 6 0 1 0 -8 0" fill="#34d399"/>
  </g>

  <!-- Main structure/base -->
  <rect x="30" y="60" width="40" height="28" fill="#059669" opacity="0.9" rx="2"/>

  <!-- Door -->
  <rect x="43" y="68" width="14" height="20" fill="#047857" rx="1"/>
  <circle cx="56" cy="78" r="1.5" fill="#fbbf24"/>

  <!-- Windows -->
  <rect x="33" y="65" width="6" height="6" fill="#0891b2" opacity="0.7"/>
  <rect x="61" y="65" width="6" height="6" fill="#0891b2" opacity="0.7"/>
  <rect x="33" y="76" width="6" height="6" fill="#0891b2" opacity="0.7"/>
  <rect x="61" y="76" width="6" height="6" fill="#0891b2" opacity="0.7"/>

  <!-- Minaret (tower) on right -->
  <rect x="75" y="30" width="5" height="58" fill="#059669" opacity="0.8" rx="2.5"/>

  <!-- Crescent on minaret top -->
  <g transform="translate(77.5, 22)">
    <path d="M -3.5 0 A 3.5 3.5 0 1 1 3.5 0 A 2.5 2.5 0 1 0 -3.5 0" fill="#34d399"/>
  </g>
</svg>